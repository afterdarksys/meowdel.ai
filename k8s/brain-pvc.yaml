apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: brain-pvc
  namespace: meowdel
  labels:
    app: meowdel
    component: brain
spec:
  accessModes:
    - ReadWriteOnce  # NOTE: Changed from RWX - only one pod can mount at a time
    # TODO: Set up NFS or OCI FSS for ReadWriteMany support for multi-pod scaling
  resources:
    requests:
      storage: 50Gi
  storageClassName: oci-bv  # OCI Block Volume (default)
