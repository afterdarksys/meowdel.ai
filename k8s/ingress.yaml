apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meowdel-ingress
  namespace: meowdel
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"

    # CORS (if needed)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://meowdel.ai"

    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"

spec:
  tls:
    - hosts:
        - meowdel.ai
        - www.meowdel.ai
      secretName: meowdel-tls
  rules:
    - host: meowdel.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meowdel-web-service
                port:
                  number: 80
    - host: www.meowdel.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meowdel-web-service
                port:
                  number: 80

---
# Certificate issuer (requires cert-manager)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@meowdel.ai  # Change this!
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
