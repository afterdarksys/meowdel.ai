apiVersion: apps/v1
kind: Deployment
metadata:
  name: meowdel-web
  namespace: meowdel
  labels:
    app: meowdel-web
spec:
  replicas: 3  # Scale as needed
  selector:
    matchLabels:
      app: meowdel-web
  template:
    metadata:
      labels:
        app: meowdel-web
    spec:
      containers:
        - name: web
          image: meowdel/web-app:latest  # Build and push your image
          ports:
            - containerPort: 3000
          env:
            # From ConfigMap
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: NODE_ENV
            - name: NEXT_PUBLIC_SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: NEXT_PUBLIC_SITE_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: OLLAMA_BASE_URL
            - name: OAUTH2_PROVIDER_URL
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: OAUTH2_PROVIDER_URL
            - name: OAUTH2_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: OAUTH2_REDIRECT_URI
            - name: OAUTH2_SCOPES
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: OAUTH2_SCOPES
            - name: BRAIN_DIR
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: BRAIN_DIR
            - name: GRAPH_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: GRAPH_CACHE_TTL
            - name: AI_WORKER_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: meowdel-config
                  key: AI_WORKER_ENABLED

            # From Secrets
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: meowdel-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meowdel-secrets
                  key: ANTHROPIC_API_KEY
            - name: OAUTH2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: meowdel-secrets
                  key: OAUTH2_CLIENT_ID
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: meowdel-secrets
                  key: OAUTH2_CLIENT_SECRET

            # Computed
            - name: REDIS_URL
              value: "redis://redis-service:6379"

          volumeMounts:
            - name: brain-storage
              mountPath: /app/brain
              readOnly: false

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/ai/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/ai/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: brain-storage
          persistentVolumeClaim:
            claimName: brain-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: meowdel-web-service
  namespace: meowdel
  labels:
    app: meowdel-web
spec:
  selector:
    app: meowdel-web
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: meowdel-web-hpa
  namespace: meowdel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: meowdel-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
