# IMPORTANT: This is a template!
# 1. Copy this file to secrets.yaml
# 2. Replace all YOUR_*_HERE values with real secrets
# 3. Apply: kubectl apply -f secrets.yaml
# 4. NEVER commit secrets.yaml to git!

apiVersion: v1
kind: Secret
metadata:
  name: meowdel-secrets
  namespace: meowdel
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "meowdel"
  POSTGRES_PASSWORD: "YOUR_POSTGRES_PASSWORD_HERE"
  DATABASE_URL: "postgresql://meowdel:YOUR_POSTGRES_PASSWORD_HERE@postgres-service:5432/meowdel"

  # Anthropic API Key
  ANTHROPIC_API_KEY: "YOUR_ANTHROPIC_API_KEY_HERE"

  # OAuth2 Secrets
  OAUTH2_CLIENT_ID: "meowdel-client"
  OAUTH2_CLIENT_SECRET: "YOUR_OAUTH_CLIENT_SECRET_HERE"

---
