services:
  meowdel-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://meowdel.ai}
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://meowdel.ai}
      - DATABASE_URL=postgresql://meowdel:meowdel_pass@afterdark-postgres-primary:5432/meowdel
    restart: unless-stopped
    networks:
      - afterdark-db-network
      - letsgoout_letsgoout-network
      - meowdel-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=letsgoout_letsgoout-network"
      - "traefik.http.routers.meowdel.entrypoints=websecure"
      - "traefik.http.routers.meowdel.rule=Host(`meowdel.ai`) || Host(`www.meowdel.ai`)"
      - "traefik.http.routers.meowdel.tls=true"
      - "traefik.http.routers.meowdel.tls.certresolver=letsencrypt"
      - "traefik.http.routers.meowdel.service=meowdel-service"
      - "traefik.http.routers.meowdel.middlewares=meowdel-www"
      - "traefik.http.services.meowdel-service.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.meowdel-www.redirectregex.regex=^https://www\\.meowdel\\.ai/(.*)"
      - "traefik.http.middlewares.meowdel-www.redirectregex.replacement=https://meowdel.ai/$${1}"

  meowdel-qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - meowdel-internal

  meowdel-ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - meowdel-internal

networks:
  afterdark-db-network:
    external: true
  letsgoout_letsgoout-network:
    external: true
  meowdel-internal:
    driver: bridge

volumes:
  qdrant-data:
  ollama-data:
