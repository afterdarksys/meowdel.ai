version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://meowdel.ai}
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://meowdel.ai}
      - DATABASE_URL=postgresql://meowdel:meowdel_pass@db:5432/meowdel
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: meowdel
      POSTGRES_PASSWORD: meowdel_pass
      POSTGRES_DB: meowdel
    ports:
      - "5444:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  vision-engine:
    build:
      context: ../vision-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
